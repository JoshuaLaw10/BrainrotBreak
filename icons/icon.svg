<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0f172a"/>

  <!-- Brain outline — simplified two-hemisphere design -->
  <!-- Left hemisphere -->
  <path d="
    M 64 30
    C 48 30, 36 38, 32 50
    C 28 58, 30 66, 34 72
    C 30 76, 30 82, 34 86
    C 38 90, 44 90, 48 88
    C 50 92, 54 94, 58 94
    L 64 94
    L 64 30 Z
  " fill="none" stroke="#6366f1" stroke-width="4" stroke-linejoin="round"/>

  <!-- Right hemisphere -->
  <path d="
    M 64 30
    C 80 30, 92 38, 96 50
    C 100 58, 98 66, 94 72
    C 98 76, 98 82, 94 86
    C 90 90, 84 90, 80 88
    C 78 92, 74 94, 70 94
    L 64 94
    L 64 30 Z
  " fill="none" stroke="#6366f1" stroke-width="4" stroke-linejoin="round"/>

  <!-- Center dividing line -->
  <line x1="64" y1="30" x2="64" y2="94" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="4 3"/>

  <!-- Left hemisphere folds -->
  <path d="M 50 44 C 44 48, 40 54, 42 60" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 44 62 C 40 68, 42 74, 46 78" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 54 38 C 48 42, 46 48, 48 54" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>

  <!-- Right hemisphere folds -->
  <path d="M 78 44 C 84 48, 88 54, 86 60" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 84 62 C 88 68, 86 74, 82 78" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 74 38 C 80 42, 82 48, 80 54" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>

  <!-- Small play triangle (bottom right) — suggests video/reels -->
  <circle cx="88" cy="90" r="14" fill="#6366f1"/>
  <polygon points="84,85 84,95 94,90" fill="#fff"/>
</svg>
